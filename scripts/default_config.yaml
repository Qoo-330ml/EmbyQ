database:
  name: emby_playback.db
emby:
  server_url: https://emby.example.com
  external_url: https://emby.example.com
  api_key: your_api_key_here
service:
  external_url: https://embyq.example.com:5000
monitor:
  check_interval: 10
ip_location:
  use_geocache: false
notifications:
  alert_threshold: 2
  enable_alerts: true
security:
  whitelist:
    - admin
    - user1
    - user2
webhook:
  enabled: false
  url:
  timeout: 10
  retry_attempts: 3
  body:
    title: Emby用户封禁通知
    content: 用户 {username} 在 {location} 使用 {ip_address} ({ip_type}) 登录，检测到 {session_count} 个并发会话，已自动封禁。
tmdb:
  enabled: true
  api_key:
  language: zh-CN
  include_adult: false
guest_request:
  enabled: true
web:
  admin_username: admin
  admin_password: admin123
proxy:
  enabled: false
  url: ""
